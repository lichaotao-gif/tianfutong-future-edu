    border-radius: 50%;

  .stat::after {

  .form-row textarea:focus, .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--primary); }
  .photo-up { flex: 1; border: 1.5px dashed #d9dce3; border-radius: 8px; padding: 16px 0; text-align: center; font-size: 13px; color: var(--muted); cursor: pointer; background: #fafbfc; }

  .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-8px); background: rgba(20,22,30,.88); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0; pointer-events: none; transition: all .25s; }

function decorateTh(root) {
  (root || document).querySelectorAll('th').forEach((th) => {
    if (th.dataset.qi) return;
    const label = th.textContent.trim();
    const def = COLDEF[label];
    if (def) {
      th.dataset.qi = '1';
      th.innerHTML = `${label} <span class="qi" title="查看字段解释" onclick="event.stopPropagation();showFieldDef('${label.replace(/'/g, '\\\'')}', '${def.replace(/\\/g, '\\\\').replace(/'/g, '\\\'')}')">?</span>`;

  });
}

  role = r;

function go(p) { page = p; render(); }

/* ---------- 渲染 ---------- */
function render() {
  document.getElementById('roleOrg').classList.toggle('on', role === 'org');
  document.getElementById('roleTeacher').classList.toggle('on', role === 'teacher');
  document.getElementById('whoami').innerHTML = role === 'org'
    ? `当前角色：<b>机构管理员</b>（${ORG.contact}）` : `当前角色：<b>教师账号</b>（${ME_TEACHER.name}）`;

  document.getElementById('menu').innerHTML = MENUS[role]
    .map(([k, label]) => `<div class="menu-item ${page === k ? 'active' : ''}" onclick="go('${k}')">${label}</div>`).join('');

  const labels = Object.fromEntries(MENUS[role]);
  document.getElementById('pageTitle').textContent = labels[page] || '';
  document.getElementById('content').innerHTML = PAGES[page]();
  decorateTh(document.getElementById('content'));
}

const myClasses = () => role === 'teacher' ? CLASSES.filter((c) => c.tid === 't1') : CLASSES;

  const ids = myClasses().map((c) => c.id);
  return STUDENTS.filter((s) => ids.includes(s.cls));
};
const myRecords = () => role === 'teacher' ? RECORDS.filter((r) => r.tid === 't1') : RECORDS;
const myLessons = () => role === 'teacher' ? LESSONS.filter((l) => l.tid === 't1') : LESSONS;
const myCheckins = () => role === 'teacher' ? CHECKINS.filter((c) => c.tid === 't1') : CHECKINS;

const DEMO_TODAY = '2026-07-08';
const checkinStatus = (task) => task.submitted ? '已签到' : '未签到';
const recordOfTask = (task) => RECORDS.find((r) => r.id === task.recordId);
const recordOfLesson = (lesson) => RECORDS.find((r) => r.tid === lesson.tid && r.no === lesson.no && r.date === lesson.date)
  || RECORDS.find((r) => r.tid === lesson.tid && r.no === lesson.no && r.cls === lesson.cls);
const checkinOfRecord = (record) => record ? CHECKINS.find((task) => task.recordId === record.id) : null;
const checkinOfLesson = (lesson) => checkinOfRecord(recordOfLesson(lesson));
const lessonStage = (l) => l.status === '待上课' ? '未上' : '已上';
const lessonRecordStatus = (l) => l.tSubmit === '已提交' ? '已提交' : '未提交';
const lessonAction = (l) => {
  if (l.sign === '未签到') return `<button class="btn btn-primary" onclick="openLessonCheckin('${l.tid}', ${l.no}, '${l.date}')">去签到</button>`;
  const record = recordOfLesson(l);
  if (lessonRecordStatus(l) === '未提交') {
    return record ? `<button class="btn btn-primary" onclick="openRecordForm('${record.id}')">填记录</button>` : `<button class="btn btn-primary" onclick="go('records')">填记录</button>`;
  }
  return `<button class="btn btn-ghost" onclick="viewLessonDetail('${l.tid}', ${l.no}, '${l.date}')">查看</button>`;
};

    <td>${tag(l.sign || '未签到')}</td><td>${tag(lessonRecordStatus(l))}</td>

/* ---------- 弹窗 ---------- */
function openModal(title, body, foot) {
  document.getElementById('mTitle').textContent = title;
  document.getElementById('mBody').innerHTML = body;
  document.getElementById('mFoot').innerHTML = foot || `<button class="btn btn-ghost" onclick="closeModal()">关闭</button>`;
  document.getElementById('mask').classList.add('show');
  decorateTh(document.getElementById('mBody'));
}
function closeModal() { document.getElementById('mask').classList.remove('show'); }

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function submitTeacherForm() {
  const name = document.getElementById('tcName').value.trim();
  const phone = document.getElementById('tcPhone').value.trim();
  const dir = document.getElementById('tcDir').value.trim();
  const idcard = document.getElementById('tcIdcard').value.trim();
  const cert = document.getElementById('tcCert').value.trim();
  const teacherPhoto = document.getElementById('tcTeacherPhoto').files[0];
  const certPhoto = document.getElementById('tcCertPhoto').files[0];
  const bio = document.getElementById('tcBio').value.trim();
  if (!name || !phone || !dir || !cert || !teacherPhoto || !certPhoto) return toast('请填写教师信息，并上传个人照片和资格证照片');
  if (TEACHERS.some((t) => t.phone === phone)) return toast('该手机号已创建教师账号，请勿重复添加');
  const id = 't' + Date.now();
  const teacher = {
    id,
    name,
    phone,
    dir,
    status: '待平台审核',
    classes: 0,
    monthLessons: 0,
    cert,
    teacherPhoto: teacherPhoto.name,
    certPhoto: certPhoto.name,
    idcard: idcard || '待补充',
    bio: bio || '待补充',
  };
  teacher.accountInfo = teacherAccount(teacher);
  TEACHERS.unshift(teacher);
  closeModal();
  render();
  openTeacherAccount(id);
  toast('教师已创建并提交平台审核，教师端账户已开通');
}

  const price = parseInt(document.getElementById('ccPrice').value, 10) || 0;
  const teacher = document.getElementById('ccTeacher').value;
  const venue = document.getElementById('ccVenue').value;
  const device = document.getElementById('ccDevice').value;
  const intro = document.getElementById('ccIntro').value.trim();
  const syllabus = document.getElementById('ccSyllabus').value.split('\n').map((s) => s.trim()).filter(Boolean);
  if (!name || !cat || !grade || !lessons || !price || !teacher || !venue || !intro || !syllabus.length) {
    return toast('请填写课程名称、分类、年级、课时、价格、教师、场地、介绍和大纲');
  }
  COURSES.unshift({
    id: 'c' + Date.now(),
    name,
    cat,
    grade,
    lessons,
    price,
    status: '待平台审核',
    schools: 0,
    teacher,
    venue,
    device: device || '待配置',
    intro,
    syllabus,
    audits: [{ t: new Date().toLocaleString('zh-CN', { hour12: false }), act: '机构提交课程审核', by: ORG.contact }],
  });
  closeModal();
  render();
  toast('课程已提交平台审核');
}
/* 班级学生 */
function classStudents(id) {
  const c = CLASSES.find((x) => x.id === id);
  const rows = STUDENTS.filter((s) => s.cls === id);
  openModal(c.name + ' · 学生名单（' + c.enrolled + ' 人，示例展示 ' + rows.length + ' 人）', `
    <div class="tbl-wrap"><table>
      <tr><th>学生</th><th>年级班级</th><th>家长手机号</th><th>出勤</th></tr>
      ${rows.map((s) => `<tr><td><b>${s.name}</b></td><td>${s.grade}</td><td>${s.phone}</td><td>${s.attend}</td></tr>`).join('')}
    </table></div>`);
}
/* 结算详情 */
function settleDetail(i) {
  const s = SETTLES[i];
  openModal('结算明细 · ' + s.id, `
    <div class="tbl-wrap"><table>
      <tr><th>班级</th><th>已确认销课</th><th>可结算金额</th></tr>
      ${s.detail.map((d) => `<tr><td>${d.cls}</td><td>${d.lessons} 节</td><td>${money(d.amount)}</td></tr>`).join('')}
    </table></div>
    <h5>结算计算</h5>
    <div class="desc">
      <div class="k">应结算金额</div><div class="v">${money(s.gross)}</div>
      <div class="k">退款扣减</div><div class="v">− ${money(s.refund)}</div>
      <div class="k">机构分成比例</div><div class="v">${s.ratio}</div>
      <div class="k">机构实收</div><div class="v"><b style="color:var(--primary);font-size:15px">${money(s.net)}</b> <span style="color:var(--muted);font-size:12px">=（应结算 − 退款扣减）× ${s.ratio}</span></div>
      <div class="k">结算状态</div><div class="v">${tag(s.status)}</div>
    </div>`);
}

/* 签到交互 */
function openLessonCheckin(tid, no, date) {
  const lesson = LESSONS.find((l) => l.tid === tid && l.no === no && l.date === date);
  if (!lesson) return toast('未找到课次');
  if (lesson.date > DEMO_TODAY) return toast(`未到上课时间：${lesson.date} ${lesson.time || ''}，请到课前再签到`);
  const task = checkinOfLesson(lesson);
  if (!task) return toast('该课次暂未生成今日签到任务');
  openCheckin(task.id);
}
function viewLessonDetail(tid, no, date) {
  const lesson = LESSONS.find((l) => l.tid === tid && l.no === no && l.date === date);
  if (!lesson) return toast('未找到课次');
  const record = recordOfLesson(lesson);
  const task = checkinOfLesson(lesson);
  const rows = task ? task.students.map((s) => `
    <tr><td>${s.name}</td><td>${tag(s.st)}</td></tr>`).join('') : '';
  openModal(`课次详情 · ${lesson.cls} 第 ${lesson.no} 节`, `
    <div class="desc">
      <div class="k">课程</div><div class="v">${lesson.course}</div>
      <div class="k">学校 / 场地</div><div class="v">${lesson.school} · ${lesson.venue || '—'}</div>
      <div class="k">上课时间</div><div class="v">${lesson.date} ${lesson.time || ''}</div>
      <div class="k">教师</div><div class="v">${lesson.teacher}</div>
      <div class="k">签到状态</div><div class="v">${tag(lesson.sign || '未签到')}</div>
      <div class="k">课堂记录</div><div class="v">${tag(record ? record.status : lessonRecordStatus(lesson))}</div>
      <div class="k">销课状态</div><div class="v">${tag(lesson.status)}${lesson.note ? ` <span style="color:var(--muted);font-size:12px">${lesson.note}</span>` : ''}</div>
      <div class="k">应到 / 实到</div><div class="v">${lesson.due} 人 / ${lesson.actual || '—'} 人</div>
    </div>
    <h5>签到明细</h5>
    ${task ? `<div class="tbl-wrap"><table><tr><th>学生</th><th>考勤状态</th></tr>${rows}</table></div>` : '<div class="empty">暂无签到明细</div>'}
    <h5>课堂记录</h5>
    ${record ? `
      <div class="desc">
        <div class="k">上课内容</div><div class="v">${record.content || '—'}</div>
        <div class="k">到课 / 缺勤</div><div class="v">${record.attend || '—'} 人 / ${record.status === '已提交' ? record.absent : '—'} 人</div>
        <div class="k">课堂情况</div><div class="v">${record.mood || '—'}</div>
        <div class="k">课后评语</div><div class="v">${record.comment || '—'}</div>
      </div>` : '<div class="empty">暂无课堂记录</div>'}`,
    `<button class="btn btn-ghost" onclick="closeModal()">关闭</button>
     ${task ? `<button class="btn btn-ghost" onclick="openCheckin('${task.id}')">${task.submitted ? '修改签到' : '去签到'}</button>` : ''}
     ${record ? `<button class="btn btn-primary" onclick="openRecordForm('${record.id}')">${record.status === '已提交' ? '修改记录' : '填写记录'}</button>` : ''}`);
}
function viewLessonDetailByRecord(id) {
  const record = RECORDS.find((r) => r.id === id);
  if (!record) return toast('未找到课堂记录');
  const lesson = LESSONS.find((l) => l.tid === record.tid && l.no === record.no && l.date === record.date)
    || LESSONS.find((l) => l.tid === record.tid && l.no === record.no && l.cls === record.cls);
  if (!lesson) return viewRecord(id);
  viewLessonDetail(lesson.tid, lesson.no, lesson.date);
}
function openCheckin(id) {
  const task = CHECKINS.find((x) => x.id === id);
  if (!task) return toast('未找到上课任务');
  const arrived = task.students.filter((s) => s.st === '已到').length;
  openModal(`上课签到 · ${task.className}`, `
    <div class="sign-head">
      <div><span class="k">课程</span>${task.course}</div>
      <div><span class="k">教师</span>${task.teacher}</div>
      <div><span class="k">学校</span>${task.school}</div>
      <div><span class="k">地点</span>${task.venue}</div>
      <div><span class="k">时间</span>${task.time}</div>
      <div><span class="k">状态</span>${tag(checkinStatus(task))}</div>
    </div>
    ${task.students.map((s, i) => `
      <div class="sign-row">
        <span class="nm">${s.name}</span>
        <div class="sign-btns">
          ${['已到', '缺勤'].map((st) => `<button class="${s.st === st ? 'on-' + st : ''}" onclick="setSign('${task.id}', ${i}, '${st}')">${st}</button>`).join('')}
        </div>
      </div>`).join('')}
    <div style="margin-top:16px;color:var(--muted);font-size:13px">到课 ${arrived} / ${task.students.length} 人${task.submitted ? ' · 本节签到已提交' : ''}</div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-primary" onclick="submitSign('${task.id}')">${task.submitted ? '更新签到' : '提交签到'}</button>`);
}
function setSign(id, i, st) {
  const task = CHECKINS.find((x) => x.id === id);
  if (!task) return toast('未找到上课任务');
  task.students[i].st = st;
  openCheckin(id);
}
function submitSign(id) {
  const task = CHECKINS.find((x) => x.id === id);
  if (!task) return toast('未找到上课任务');
  task.submitted = true;
  const r = recordOfTask(task);
  if (r && r.status !== '已提交') r.status = '待填写';
  const lesson = r ? LESSONS.find((l) => l.tid === r.tid && l.no === r.no && l.cls === r.cls) : null;
  if (lesson) lesson.sign = '已签到';
  closeModal();
  render();
  toast('签到已提交，可以继续填写课堂记录');
}

/* 课堂记录表单 */
function openRecordForm(id) {
  const r = RECORDS.find((x) => x.id === id);
  openModal(`${r.status === '已提交' ? '修改' : '填写'}课堂记录 · ${r.cls} 第 ${r.no} 节`, `
    <div class="form-row"><label>本节课内容</label><input id="rcContent" value="${esc(r.content)}" placeholder="如：AI 故事创作"></div>
    <div class="form-row"><label>课堂情况</label><textarea id="rcMood" rows="2" placeholder="课堂气氛、学生参与度等">${esc(r.mood)}</textarea></div>
    <div class="form-row"><label>课后评语</label><textarea id="rcComment" rows="2" placeholder="给家长/学生的整体评语">${esc(r.comment)}</textarea></div>
    <div class="form-row"><label>课前 / 课后照片核验 <span style="color:var(--muted);font-weight:400">（仅平台内部监管可见，家长不可见）</span></label>
      <div style="display:flex;gap:10px">
        <div class="photo-up" onclick="toast('Demo：调起拍照，上传课前教室/设备照片')">📷 课前照片</div>
        <div class="photo-up" onclick="toast('Demo：调起拍照，上传课后关门关灯/设备归位照片')">📷 课后照片</div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px">重点教室须核验设备与关门关灯情况，照片与原始记录比对留痕</div>
    </div>
    <div class="form-row"><label>备注（选填）</label><input id="rcNote" placeholder="需要机构或平台注意的事项"></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-primary" onclick="submitRecord('${id}')">${r.status === '已提交' ? '保存修改' : '提交记录'}</button>`);
}
function submitRecord(id) {
  const r = RECORDS.find((x) => x.id === id);
  const content = document.getElementById('rcContent').value.trim();
  if (!content) return toast('请填写本节课内容');
  const task = CHECKINS.find((x) => x.recordId === id);
  const signStudents = task ? task.students : [];
  const arrived = signStudents.filter((s) => s.st === '已到').length;
  r.content = content;
  r.mood = document.getElementById('rcMood').value.trim() || '正常';
  r.comment = document.getElementById('rcComment').value.trim() || '—';
  r.attend = signStudents.length ? arrived : r.attend;
  r.absent = signStudents.length ? signStudents.length - arrived : r.absent;
  r.status = '已提交';
  if (task) task.submitted = true;
  const lesson = LESSONS.find((l) => l.tid === r.tid && l.no === r.no && l.cls === r.cls);
  if (lesson) {
    lesson.sign = '已签到';
    lesson.actual = r.attend;
    lesson.tSubmit = '已提交';
    lesson.confirm = '待确认';
    lesson.status = '已上课待确认';
  }
  closeModal();
  render();
  toast('课堂记录已保存，本节课进入销课流程');
}
function viewRecord(id) {
  const r = RECORDS.find((x) => x.id === id);
  openModal(`课堂记录 · ${r.cls} 第 ${r.no} 节`, `
    <div class="desc">
      <div class="k">上课日期</div><div class="v">${r.date}</div>
      <div class="k">上课内容</div><div class="v">${r.content}</div>
      <div class="k">到课 / 缺勤</div><div class="v">${r.attend} 人 / ${r.absent} 人</div>
      <div class="k">课堂情况</div><div class="v">${r.mood}</div>
      <div class="k">课后评语</div><div class="v">${r.comment}</div>
      <div class="k">提交状态</div><div class="v">${tag(r.status)}</div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">关闭</button>
     <button class="btn btn-primary" onclick="openRecordForm('${r.id}')">修改记录</button>`);
}

render();
</script>
</body>
</html>
