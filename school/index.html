    background: var(--stat-glow, rgba(14,159,110,.14));

  .stat::after {

function decorateTh(root) {
  (root || document).querySelectorAll('th').forEach((th) => {
    if (th.dataset.qi) return;
    const label = th.textContent.trim();
    const def = COLDEF[label];
    if (def) {
      th.dataset.qi = '1';
      th.innerHTML = `${label} <span class="qi" title="${def.replace(/"/g, '&quot;')}">?</span>`;
    }
  });
}

        <td>${x.school === '待确认' ? `<span class="lnk" onclick="confirmLesson('${x.id}')">确认完成</span>
            <span class="lnk danger" onclick="lessonAbnormal('${x.id}')">标记异常</span>` : ''}
            <span class="lnk" onclick="go('records')">查看详情</span></td>
      </tr>`).join('')}
    </table></div>`;
  },

  aftersale() {
    return `<div class="page-title"><span></span><span class="hint">学校只处理与本校组织、场地、学生相关的协同事项，售后结论由平台处理</span></div>
    <div class="tbl-wrap"><table>
      <tr><th>售后编号</th><th>学生姓名</th><th>课程班级</th><th>问题类型</th><th>当前状态</th><th>平台处理意见</th><th>是否需要学校协助</th><th>操作</th></tr>
      ${D().aftersales.length ? D().aftersales.map((a) => `<tr>
        <td>${a.id}</td><td><b>${a.student}</b></td><td>${a.cls}</td>
        <td><span class="tag tg-red">${a.type}</span></td><td>${tag(a.status)}</td>
        <td class="ell" style="max-width:240px" title="${a.opinion}">${a.opinion}</td><td>${a.need}</td>
        <td><span class="lnk" onclick="toast('Demo：售后详情与沟通记录')">查看</span>
            ${a.status === '需学校协助' ? `<span class="lnk warn" onclick="feedback('${a.id}')">提交学校反馈</span>` : ''}</td>
      </tr>`).join('') : '<tr><td colspan="8" class="empty">暂无售后协同事项</td></tr>'}
    </table></div>`;
  },

  notices() {
    return `<div class="card">
      ${D().notices.map((n) => `<div class="notice-item ${n.read ? 'read' : ''}">
        <span class="dot"></span>
        <div style="flex:1"><div class="nt">${n.t}</div><div style="font-size:13px;color:#52565e">${n.d}</div><div class="nd">${n.time}</div></div>
      </div>`).join('')}
    </div>`;
  },
};

/* ---------- 弹窗 / Toast ---------- */
function openModal(title, body, foot) {
  document.getElementById('mTitle').textContent = title;
  document.getElementById('mBody').innerHTML = body;
  document.getElementById('mFoot').innerHTML = foot || `<button class="btn btn-ghost" onclick="closeModal()">关闭</button>`;
  document.getElementById('mask').classList.add('show');
  decorateTh(document.getElementById('mBody'));
}
function closeModal() { document.getElementById('mask').classList.remove('show'); }
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ---------- 交互 ---------- */
function editInfo() {
  const i = D().info;
  openModal('编辑学校信息', `
    <div class="form-row"><label>学校联系人</label><input value="${i.contact}"></div>
    <div class="form-row"><label>联系电话</label><input value="${i.phone}"></div>
    <div class="form-row"><label>学校地址</label><input value="${i.addr}"></div>
    <div class="form-row"><label>是否允许外校学生报名</label><input value="${i.outside}" placeholder="是 / 否"></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-primary" onclick="closeModal();toast('Demo：学校信息已保存')">保存</button>`);
}

function venueSchedule(id) {
  const v = D().venues.find((x) => x.id === id);
  const rows = D().classes.filter((c) => c.venue === v.name);
  openModal('场地排课 · ' + v.name, rows.length ? `
    <div class="tbl-wrap"><table>
      <tr><th>班级名称</th><th>上课时间</th><th>任课老师</th><th>班级状态</th></tr>
      ${rows.map((c) => `<tr><td>${c.name}</td><td>${c.time}</td><td>${c.teacher}</td><td>${tag(c.status)}</td></tr>`).join('')}
    </table></div>` : '<div class="empty">该场地暂无排课</div>');
}

function courseDetail(id) {
  const c = D().courses.find((x) => x.id === id);
  openModal('课程详情 · ' + c.name, `
    <div class="desc">
      <div class="k">所属机构</div><div class="v">${c.org}</div>
      <div class="k">平台审核状态</div><div class="v"><span class="tag tg-green">${c.audit}</span></div>
      <div class="k">课程分类</div><div class="v">${c.cat} · ${c.grade}</div>
      <div class="k">课时 / 价格</div><div class="v">${c.lessons} 节 · ¥${c.price}/期</div>
      <div class="k">成班 / 班额</div><div class="v">满 ${c.min} 人开班 · 最大 ${c.max} 人</div>
      <div class="k">所需场地</div><div class="v">${c.venue}</div>
      <div class="k">所需设备</div><div class="v">${c.device}</div>
      <div class="k">任课老师</div><div class="v">${c.teacher}</div>
      <div class="k">课程介绍</div><div class="v">${c.intro}</div>
    </div>
    <h5>每节课大纲</h5>
    <ol>${c.syllabus.map((s) => `<li>${s}</li>`).join('')}</ol>
    <div class="m-tip">说明：机构与课程资质由<b>平台</b>审核；学校只需确认本校是否开放该课程。</div>`);
}
function confirmCourse(id) {
  const c = D().courses.find((x) => x.id === id);
  c.shelf = '已上架';
  render();
  toast('已确认开放，「' + c.name + '」将在本校家长端展示');
}
function pauseCourse(id) {
  const c = D().courses.find((x) => x.id === id);
  c.shelf = '已暂停';
  render();
  toast('已暂停开放，本校家长端不再展示该课程（存量班级正常上完）');
}

function classRoster(id) {
  const c = D().classes.find((x) => x.id === id);
  const rows = D().students.filter((s) => s.course === c.course);
  openModal(c.name + ' · 报名名单（' + c.enrolled + ' 人，示例展示 ' + rows.length + ' 人）', rows.length ? `
    <div class="tbl-wrap"><table>
      <tr><th>学生姓名</th><th>年级班级</th><th>家长手机号</th><th>支付状态</th></tr>
      ${rows.map((s) => `<tr><td><b>${s.name}</b></td><td>${s.grade}</td><td>${s.phone}</td><td>${tag(s.pay)}</td></tr>`).join('')}
    </table></div>` : '<div class="empty">暂无报名学生</div>');
}

function studentDetail(i) {
  const s = D().students[i];
  openModal('报名详情 · ' + s.name, `
    <div class="desc">
      <div class="k">学生姓名</div><div class="v">${s.name}</div>
      <div class="k">年级班级</div><div class="v">${s.grade}</div>
      <div class="k">报名课程</div><div class="v">${s.course}（${s.cls}）</div>
      <div class="k">家长手机号</div><div class="v">${s.phone}（脱敏）</div>
      <div class="k">报名时间</div><div class="v">${s.payTime}</div>
      <div class="k">支付状态</div><div class="v">${tag(s.pay)} <span style="color:var(--muted);font-size:12px">资金由平台托管，学校端不涉及金额</span></div>
      <div class="k">报名状态</div><div class="v">${tag(s.status)}</div>
    </div>`);
}

function confirmSchedule(id) {
  const s = D().schedule.find((x) => x.id === id);
  openModal('确认排课 · ' + s.cls, `
    <div class="desc">
      <div class="k">班级名称</div><div class="v">${s.cls}</div>
      <div class="k">上课时间</div><div class="v">${s.time}</div>
      <div class="k">上课场地</div><div class="v">${s.venue}</div>
      <div class="k">任课老师</div><div class="v">${s.teacher}（机构派驻，资质平台已审核）</div>
      <div class="k">当前报名</div><div class="v">${s.enrolled} / ${s.max} 人</div>
    </div>
    <div class="m-tip"><b>注意事项：</b>确认前请核对该时段场地无校内活动冲突；确认后平台将通知机构与家长，按此安排开课。</div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-primary" onclick="doConfirmSchedule('${id}')">确认排课</button>`);
}
function doConfirmSchedule(id) {
  const s = D().schedule.find((x) => x.id === id);
  s.status = '已确认';
  closeModal();
  render();
  toast('排课已确认，平台将通知机构与家长按此安排开课');
}
function adjust(id, what) {
  const s = D().schedule.find((x) => x.id === id);
  s.status = '需调整';
  render();
  toast('已标记需调整' + what + '，平台将与机构重新协调');
}
function backToPlatform(id) {
  const s = D().schedule.find((x) => x.id === id);
  s.status = '需调整';
  render();
  toast('已退回平台重新安排');
}

function recordDetail(id) {
  const r = D().records.find((x) => x.id === id);
  openModal(`上课详情 · ${r.cls} 第 ${r.no} 节`, `
    <div class="desc">
      <div class="k">上课日期</div><div class="v">${r.date} ${r.time}</div>
      <div class="k">上课场地</div><div class="v">${r.venue}</div>
      <div class="k">任课老师</div><div class="v">${r.teacher}</div>
      <div class="k">老师签到时间</div><div class="v">${r.signAt}</div>
      <div class="k">学生出勤</div><div class="v">应到 ${r.due} 人 · 实到 ${r.actual || '—'} 人</div>
      <div class="k">课堂记录</div><div class="v">${r.content || '—'}</div>
      <div class="k">课堂情况</div><div class="v">${r.mood || '—'}</div>
      <div class="k">课后评语</div><div class="v">${r.comment || '—'}</div>
      ${r.note ? `<div class="k">异常备注</div><div class="v" style="color:var(--red)">${r.note}</div>` : ''}
    </div>`);
}
function markAbnormal(id) {
  const r = D().records.find((x) => x.id === id);
  openModal('标记异常 · ' + r.cls + ' 第 ' + r.no + ' 节', `
    <div class="form-row"><label>异常类型</label><input placeholder="如：老师迟到 / 实到人数不符 / 课程未正常开展"></div>
    <div class="form-row"><label>异常说明</label><textarea rows="3" placeholder="请描述具体情况，平台将核实处理"></textarea></div>
    <div class="m-tip">标记异常后，该节课暂停计入机构销课，平台将要求机构在 2 个工作日内说明。</div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-primary" onclick="doMarkAbnormal('${id}')">提交异常</button>`);
}
function doMarkAbnormal(id) {
  const r = D().records.find((x) => x.id === id);
  r.record = '异常';
  const x = D().confirms.find((c) => c.cls === r.cls && c.no === r.no);
  if (x) { x.school = '有异常'; x.status = '异常'; }
  closeModal();
  render();
  toast('已标记异常并上报平台，该节课暂停计入销课');
}

function confirmLesson(id) {
  const x = D().confirms.find((c) => c.id === id);
  x.school = '已确认';
  x.status = '已确认销课';
  render();
  toast('已确认本节课真实完成，平台将计入机构销课');
}
function lessonAbnormal(id) {
  const x = D().confirms.find((c) => c.id === id);
  x.school = '有异常';
  x.status = '异常';
  render();
  toast('已标记异常，该节课暂停计入销课，平台将跟进核实');
}

function feedback(id) {
  openModal('提交学校反馈 · ' + id, `
    <div class="form-row"><label>反馈意见</label><textarea rows="4" placeholder="请填写学校核实情况与处理建议（如：可调整至周四多功能室 / 本校暂无可转入班级）"></textarea></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-primary" onclick="doFeedback('${id}')">提交反馈</button>`);
}
function doFeedback(id) {
  const a = D().aftersales.find((x) => x.id === id);
  a.status = '学校已反馈';
  closeModal();
  render();
  toast('反馈已提交，平台将根据学校意见继续处理');
}

render();
</script>
</body>
</html>
